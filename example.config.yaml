# WatchTower configuration example
#
# Required top-level keys: roots, llm
# Everything else has sensible defaults.
#
# WatchTower is a Layer-7 AppSec tool: the configured `roots` are the ONLY scope.
# Every name that resolves under a root is scanned, regardless of where it is
# hosted. Resolution splits assets on a single liveness axis — `live` (has A
# records → fully scanned) vs `dead` (NXDOMAIN/no A → takeover watch only).

roots:
  - example.com
  - example-corp.io

# Path to the MaxMind GeoLite2-ASN MMDB inside the container. OPTIONAL — when
# present it enriches assets with ASN / org (display only, never gates scanning).
# Bind-mount your local copy at /data/mmdb/. Omit to skip enrichment.
mmdb_path: /data/mmdb/GeoLite2-ASN.mmdb

# Global politeness tier (nmap-like) applied across ALL tools at once. One of:
#   paranoid   - ~serial, tiny rates, long waits (max stealth vs hardened/WAF'd)
#   gentle     - low rates + httpx threads 2 (avoid tripping WAFs)
#   normal     - the default; equals the per-tool defaults below (httpx threads 10)
#   aggressive - high rates / concurrency for targets you fully control
#   insane     - fastest + loudest (httpx threads 200) — WILL trip WAFs
# Any explicit per-tool / concurrency value below OVERRIDES the profile.
throttle: normal

# Per-stage parallelism caps. All work is IO-bound, so high numbers are fine.
concurrency:
  default: 10        # generic fan-out
  llm: 4             # AI calls (LLMs are heavier; keep this lower)
  playwright: 5      # one browser context per slot — RAM-bound
  tls: 5             # parallel sslscan host scans

# Paths visited per live host during the Playwright crawl.
# Add more for deeper supply-chain coverage (each adds a navigation per host).
paths_per_host:
  - "/"

# OpenAI-compatible LLM endpoint. Tested with Ollama, llama.cpp server, vLLM, LM
# Studio, and OpenRouter.
llm:
  base_url: http://host.docker.internal:11434/v1
  api_key: ollama
  model: llama3.1:8b-instruct
  timeout_seconds: 120
  max_retries: 1
  # Request attribution. OpenRouter shows these in its activity log so you can see
  # which calls spent what. app_title -> the `X-Title` header (the request "name");
  # app_url -> the optional `HTTP-Referer`. With tag_requests on, each call's
  # purpose (profile / triage / supply / nuclei-gen) is appended to the title so
  # spend groups by call type, and on OpenRouter the OpenAI `user` field carries
  # the full per-host label. Harmless off OpenRouter (headers/field are ignored).
  app_title: WatchTower
  app_url: null            # e.g. https://watchtower.internal
  tag_requests: true
  # Optional per-call-type model overrides. Keys: profile, triage, supply,
  # nuclei-gen. Anything unlisted uses `model` above. The per-host calls (profile/
  # triage/supply) drive cost on a large estate — profiling tolerates a cheap/fast
  # model; keep triage capable (it can suppress findings). Leave empty for one
  # model everywhere.
  models: {}
  #  profile: openai/gpt-5-mini
  #  triage: anthropic/claude-opus-4.8
  #  supply: openai/gpt-5-mini

# AI behavior.
ai:
  # Context-aware profiling: before analysing headers/scripts, infer what each
  # app IS (login portal, API, marketing site, ...) and what controls it SHOULD
  # have, then calibrate findings to that. Adds one LLM call per host.
  # Set false to use the default context-light prompts (2 calls/host, no profile).
  profiling: true

  profile:
    # Profiler INPUT source:
    #   auto   (default) - use the crawler's rendered text + curated surface
    #          manifest when supply-chain ran for the host; else fall back to the
    #          fast httpx pre-JS signals. Never spins up a browser just to profile.
    #   always - render every profiled host in a headless browser even when
    #            supply-chain is off (slower; a browser per host).
    #   never  - httpx pre-JS signals only, even if a crawl is available.
    render: auto

  # Cross-source false-positive suppression — the `ai.triage` step. The AI reviews
  # ALL deterministic findings (nuclei/TLS/js_lib/headers/takeover) for a host and
  # soft-suppresses the ones it judges false-positive / acceptable (hidden +
  # uncounted, but kept in findings.json). An AI degrade suppresses nothing.
  suppression:
    enabled: true
    # Minimum AI verdict confidence to actually hide a finding (low|medium|high).
    min_confidence: medium
    # Highest severity the AI may auto-hide; above it the verdict is advisory only
    # (the finding stays visible + counted). info|low|medium|high|critical.
    max_severity: medium
    # When true, only hosts with a usable, non-low-confidence profile get
    # suppression (the legacy gate). Default false: profile is a calibration hint.
    require_profile: false

  # Optional overrides of the built-in AI *system* prompts. null/blank = built-in
  # default (improving the default in code is picked up). Usually edited via the
  # UI (AI Tuning page); shape-hints stay in code so overrides can't break JSON.
  prompts:
    profile_system: null
    triage_system_default: null
    triage_system_profiled: null
    supply_system_default: null
    supply_system_profiled: null
    low_confidence_nudge: null

# Deterministic security-header analysis (the `headers` capability). Passive —
# evaluates the response headers httpx already captured (no new requests). The
# checker always emits first-class findings; AI soft-suppression now spans all
# sources and lives under ai.suppression (above).
headers:
  # Override a check's severity by its check_id, e.g. {hsts.missing: high}.
  severity_overrides: {}
  # Skip checks by check_id or dotted prefix, e.g. [permissions-policy, cookie].
  disabled_checks: []

# Executive report (executive.html one-pager) branding + output. All optional —
# an unconfigured run still produces a clean exec report. The full technical
# report.html is unaffected. Both reports share a light/dark theme toggle.
report:
  org_name: null           # letterhead org name (null = falls back to the scanned root)
  classification: Confidential   # banner label (blank to omit)
  logo_path: null          # optional logo, base64-embedded so the report stays self-contained
  executive_pdf: true      # also auto-render executive.pdf via the bundled Chromium (best-effort)

# Stealth identity applied to httpx, nuclei & the Playwright crawler. For
# AUTHORIZED testing of your own assets. `preset` bundles a coherent browser
# UA + headers + locale; user_agent/headers/locale override/extend it (decoys
# like X-Forwarded-For go in headers). NB: defeats UA/header WAF rules, not
# TLS/JA3 fingerprinting or IP-reputation — for those, get the scanner IP
# allowlisted. A browser preset also rotates a plausible cross-site Referer per
# tool run (search-engine/social origins; coherent with Sec-Fetch-Site=cross-site);
# pin one via headers.Referer to opt out. Default is chrome-win; set 'off' to
# disable (each tool then uses its own UA, no injected headers/referrer).
identity:
  preset: "chrome-win"   # off | chrome-win | chrome-mac | firefox  (quote: YAML reads bare off as false)
  user_agent: null       # override the preset's UA (null = use preset)
  locale: null           # e.g. tr-TR (crawler context locale)
  headers: {}            # extra/decoy headers, e.g. {X-Forwarded-For: 203.0.113.7, Referer: https://example/}

# Per-tool config. Every tool accepts `extra_flags: []` for unsurfaced flags.
tools:
  subfinder:
    extra_flags: []

  dnsx:
    rate_limit: 1000    # DNS queries/sec (-rl). DNS is cheap; high default.
    extra_flags: []

  tlsx:
    # Recon cert-grab (SAN harvest + cert dossier) against target:443. tlsx has
    # NO rate-limit flag; `concurrency` maps to -c (parallel threads).
    concurrency: 100
    extra_flags: []

  httpx:
    rate_limit: 100
    # httpx -threads (concurrent connections). THE dominant block trigger vs
    # WAF'd targets — 50 (httpx's default) floods a bank's few IPs and trips
    # temporary source-blocking; ~2-3 enumerates cleanly. Throttle sets it
    # (gentle=2, normal=10, aggressive=50) unless pinned here. Use `gentle` for
    # hardened targets.
    threads: 25
    timeout: 10
    extra_flags: []

  nuclei:
    # Drop `info` for a clean signal floor. Add it back if you want full coverage.
    severities: [low, medium, high, critical]
    auto_scan: true       # use wappalyzer detection to limit templates to relevant tech
    rate_limit: 100
    timeout: 5
    user_agent: "WatchTower/0.1"
    extra_flags: []

  takeovers:
    # nuclei http/takeovers/ templates run against live hosts with a third-party
    # CNAME; the dead/NXDOMAIN class is matched offline against the bundled DB.
    severities: [high, critical]
    rate_limit: 50
    extra_flags: []

  sslscan:
    timeout: 300            # per-host outer timeout in seconds
    extra_flags: []         # passed through to sslscan (after --no-failed --xml=)

  playwright:
    wait_until: networkidle    # one of: load, domcontentloaded, networkidle, commit
    timeout_ms: 30000
    user_agent: null           # null = default Chromium UA
    # Per-host viewport screenshot, stored as a run artifact + shown in the UI
    # (never sent to the LLM, never inlined into report.html). Disable for large
    # inventories to save disk.
    screenshot: true
