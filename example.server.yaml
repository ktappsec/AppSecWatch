# AppSecWatch Web API — example server config.
#
# BOOTSTRAP SEED ONLY. The runtime config is UI-managed: this file seeds the very
# first boot, after which a writable JSON store (APPSECWATCH_CONFIG_STORE, default
# <output_root>/.config/server-config.json) is the source of truth, edited live
# via GET/PUT /config (the Settings page). The whole base_config below — including
# llm.api_key — becomes UI-editable + persisted in that store. (There is no
# scan-target allowlist; the per-scan roots is the only scope.)
#
# Env (the API's own auth secrets stay env-only):
#   APPSECWATCH_API_KEYS        comma-separated API keys (Authorization: Bearer <key>).
#                              Guards /api/* ONLY — not the static UI.
#   APPSECWATCH_BASIC_AUTH      `user:password` HTTP Basic front door. Covers EVERYTHING,
#                              including the built UI (which is mounted with no auth
#                              dependency, so the API key alone leaves it anonymous).
#                              Either credential is sufficient; only the first colon splits.
#   APPSECWATCH_WEBHOOK_SECRET  HMAC-SHA256 signing secret for webhook callbacks
#   APPSECWATCH_LLM_API_KEY     SEEDS base_config.llm.api_key on first boot only
#   APPSECWATCH_CONFIG_STORE    path to the writable runtime store (optional override)
#   ZAP_API_KEY                ZAP daemon api.key (docker-compose zap sidecar) — set the
#                              matching base_config.zap.api_key in the UI to enable active scans
#
# Run:  appsecwatch serve -c example.server.yaml --host 127.0.0.1 --port 8080
# If APPSECWATCH_API_KEYS is unset the API runs OPEN (handy for local UI dev).

# Where run directories are written (the durable record).
output_root: ./runs

# NOTE: there is no scan-target allowlist — the per-scan `roots` is the only
# scope. With auth unset the server is OPEN and can be pointed at any host, so set
# APPSECWATCH_API_KEYS before exposing it — and APPSECWATCH_BASIC_AUTH too if a
# browser can reach it, since the API key does not cover the static UI.

bind:
  host: 0.0.0.0
  port: 8080

limits:
  max_concurrent_scans: 2
  max_queue_depth: 10

webhook:
  callback_host_allowlist:
    - svc.internal
  timeout_seconds: 10

docs_enabled: true   # expose /docs + /openapi.json

# Vulnerable-JS-library signature pack (retire.js repository, vendored as a
# bundled seed). Auto-refresh ships DISABLED: the seed always works offline, so
# an air-gapped / egress-restricted deployment never reaches out on its own.
# A manual refresh always works: POST /signatures/js-libs/update, or
# `appsecwatch update-signatures`.
signatures:
  auto_update: false     # true → refresh on the scheduler loop
  interval_hours: 24
  js_libs_url: ""        # blank = upstream; set to an internal mirror if egress is closed

# The base AppSecWatchConfig used for every scan. May instead be a path:
#   base_config: /etc/appsecwatch/scan.yaml
# `roots` is supplied per-request, so it is omitted here.
base_config:
  mmdb_path: /data/mmdb/GeoLite2-ASN.mmdb   # optional — ASN/org enrichment only
  throttle: gentle
  llm:
    base_url: https://openrouter.ai/api/v1
    model: minimax/minimax-m3
    # api_key comes from APPSECWATCH_LLM_API_KEY
  # OWASP ZAP active scan (opt-in). Disabled by default — enable + point at the
  # sidecar daemon (docker-compose `zap` service) to allow `--only zap` scans:
  #   zap:
  #     enabled: true
  #     base_url: http://zap:8090
  #     api_key: ********            # set to ${ZAP_API_KEY}; masked + persisted in the store
  # Everything else defaults and is editable at runtime via the Settings page, e.g.:
  #   ai.profile.render: auto|always|never   (profiler input: rendered capture vs httpx)
  #   tools.playwright.screenshot: true       (per-host screenshots for the dashboard)
  #   report.org_name / report.classification / report.logo_path  (executive.html branding)
  #   report.executive_pdf: true              (also render executive.pdf via bundled Chromium)
  # A scan can also override render per-run (New Scan → Profile render, or the API's
  # POST /scans "profile_render").
