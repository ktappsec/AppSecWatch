# AppSecWatch single-image deployment with PERSISTENT state.
#
# The named volume `appsecwatch-data` is mounted at /data/runs (the output_root) —
# it holds runs/<id>/ artifacts, the config store (.config/server-config.json),
# and appsecwatch.db. A named volume survives `docker compose up --build` and
# `docker rm`, so config + assets are NOT wiped on rebuild (the common gotcha).
#
# Usage (local):
#   echo "APPSECWATCH_API_KEYS=$(openssl rand -hex 32)" > .env
#   docker compose up --build
#   → UI at http://localhost:8080/ , API at /api/...
#
# Usage (a server): don't drive compose by hand — see DEPLOYMENT.md.
#   sudo bash scripts/provision.sh   # once: docker + source + .env
#   sudo bash scripts/deploy.sh      # every update: pull + build + restart + health
#
# Bind-mount the MMDB (GeoLite2-ASN) read-only so triage/ASN lookups work.

services:
  appsecwatch:
    build: .
    image: appsecwatch
    command: ["serve", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      # Published on 127.0.0.1 by default: reachable from the box only, which is
      # what a Cloudflare Tunnel (or an SSH tunnel) in front of it wants. Auth is
      # the only scope ceiling this server has, so it should not be on a public
      # interface by accident. Set APPSECWATCH_BIND=0.0.0.0 to expose it directly.
      - "${APPSECWATCH_BIND:-127.0.0.1}:8080:8080"
    environment:
      # REQUIRED before exposing the server — without it auth is OPEN (no scope ceiling).
      APPSECWATCH_API_KEYS: "${APPSECWATCH_API_KEYS:?set APPSECWATCH_API_KEYS}"
      # HTTP Basic front door, `user:password`. Unlike the API key (a per-route
      # dependency on /api/*) this also gates the STATIC UI, which is otherwise
      # served anonymously — so it is what makes a public tunnel safe. Optional:
      # blank = no browser prompt, API key only.
      APPSECWATCH_BASIC_AUTH: "${APPSECWATCH_BASIC_AUTH:-}"
      # Optional webhook HMAC secret.
      # APPSECWATCH_WEBHOOK_SECRET: "..."
    volumes:
      - appsecwatch-data:/data/runs                       # persistent: runs + .config + appsecwatch.db
      - ./mmdb:/data/mmdb:ro                            # GeoLite2-ASN.mmdb (set mmdb_path in the UI)
    # Chromium's renderer uses /dev/shm for shared memory and blows past Docker's
    # 64MB default on any content-heavy page. Playwright reports that as a renderer
    # crash, which `crawler.py` catches into artifact.errors — so the host silently
    # yields NO scripts and NO resources and reads as a script-free page (and can
    # even be mislabelled "likely bot-blocked"). Bad data, not a loud failure.
    # NB Playwright's docs suggest `ipc: host` instead; we deliberately don't —
    # this container renders hostile attacker-controlled pages, so sharing the
    # host IPC namespace is the wrong trade. A bigger private /dev/shm is enough.
    shm_size: 1gb
    restart: unless-stopped

  # OPTIONAL OWASP ZAP sidecar — only needed for the opt-in `zap` active-scan
  # capability. The heavy Java daemon stays OUT of the appsecwatch image; appsecwatch
  # drives it over REST at http://zap:8090. NOT published to the host (internal
  # only). To enable: set ZAP_API_KEY, then in the UI Settings set the zap config
  # (enabled: true, base_url: http://zap:8090, api_key: <ZAP_API_KEY>).
  # It sits behind a compose PROFILE, so a plain `docker compose up -d` never
  # starts it — matching the engine-side rule that `zap` runs only via an explicit
  # `--only zap`. Start it with:  docker compose --profile zap up -d
  zap:
    profiles: ["zap"]
    image: ghcr.io/zaproxy/zaproxy:stable
    command: >-
      zap.sh -daemon -host 0.0.0.0 -port 8090
      -config api.key=${ZAP_API_KEY:-changeme}
      -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true
    expose:
      - "8090"
    restart: unless-stopped

volumes:
  appsecwatch-data:
